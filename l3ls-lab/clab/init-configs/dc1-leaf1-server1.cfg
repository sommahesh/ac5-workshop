hostname dc1-leaf1-server1
!
no aaa root
!
username arista privilege 15 role network-admin secret arista
!
vrf instance MGMT
!
ip name-server vrf MGMT 8.8.8.8
dns domain avd.lab
!
platform tfa
   personality arfa
!
ntp local-interface vrf MGMT Management1
ntp server vrf MGMT 0.pool.ntp.org
ntp server vrf MGMT 1.pool.ntp.org
ntp server vrf MGMT 2.pool.ntp.org
!
service routing protocols model multi-agent
!
management api http-commands
   protocol https
   no shutdown
   !
   vrf MGMT
      no shutdown
!
aaa authorization exec default local
!
interface Management1
   vrf MGMT
      ip address 172.16.1.181/24
!
ip route vrf MGMT 0.0.0.0/0 172.16.1.1
ip route 0.0.0.0/0 10.10.11.1
!
ip name-server vrf MGMT 8.8.8.8
!
vlan 11
!
vlan 4092
!
interface Port-Channel1
   switchport trunk native vlan 4092
   switchport mode trunk
   spanning-tree portfast edge
!
interface Ethernet1
   no shutdown
   channel-group 1 mode active
!
interface Ethernet2
   no shutdown
   channel-group 1 mode active
!
interface Ethernet3
   no shutdown
!
interface Vlan11
   ip address 10.10.11.181/24
!
end
