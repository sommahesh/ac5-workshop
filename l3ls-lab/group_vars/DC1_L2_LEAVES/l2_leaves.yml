---
type: l2leaf

l2leaf:
  defaults:
    platform: cEOSLab
    spanning_tree_mode: mstp

  node_groups:
    - group: DC1_L2_LEAF1
      uplink_switches: [dc1-leaf1a, dc1-leaf1b]
      nodes:
        - name: dc1-leaf1c
          id: 1
          mgmt_ip: 172.16.1.151/24
    - group: DC1_L2_LEAF2
      uplink_switches: [dc1-leaf2a, dc1-leaf2b]
      nodes:
        - name: dc1-leaf2c
          id: 1
          mgmt_ip: 172.16.1.152/24
